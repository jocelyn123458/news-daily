name: 每日真实新闻日报
on:
  # 定时触发（UTC 1:00 = 北京时间 9:00）
  schedule:
    - cron: "0 1 * * *"
  # 手动触发（关键！加了这个就会显示 Run workflow 按钮）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 安装代码依赖（必须！否则可能因缺库失败）
      - name: 安装依赖
        run: pip install requests
      - name: 发送新闻日报
        run: python main.py
